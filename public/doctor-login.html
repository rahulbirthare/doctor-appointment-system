<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login - MediBook Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .form-control {
            padding: 14px 20px;
            border-radius: 14px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .btn-login {
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            width: 100%;
            border: none;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-user-md"></i>
            </div>
            <h3 class="fw-bold">Doctor Portal</h3>
            <p class="text-muted">Access your patient appointments</p>
        </div>

        <form id="doctorLoginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold text-uppercase text-muted">User ID (Email)</label>
                <input type="email" id="email" class="form-control" placeholder="doctor@medibook.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase text-muted">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Login to Dashboard</button>
        </form>

        <div class="text-center mt-4">
            <a href="login.html" class="text-decoration-none small text-primary fw-bold">Patient or Admin Login?</a>
        </div>
    </div>

    <script>
        document.getElementById('doctorLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/doctor-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'doctor-dashboard.html';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred during login');
            }
        });
    </script>
</body>
</html>
